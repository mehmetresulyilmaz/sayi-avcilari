<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Sayı Avcıları</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#5A5A40" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sayı Avcıları" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/000000/math.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <div id="fallback-ui" style="display:none; position:fixed; inset:0; background:#F5F5F0; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; font-family:sans-serif; z-index:9999;">
      <h2 style="color:#5A5A40;">Uygulama Yüklenemedi</h2>
      <p style="color:#666;">Lütfen sayfayı yenileyin veya tarayıcı önbelleğini temizleyin.</p>
      <button onclick="window.location.reload(true)" style="margin-top:20px; padding:10px 20px; background:#5A5A40; color:white; border:none; border-radius:8px; cursor:pointer;">Yeniden Dene</button>
    </div>
    <script>
      // Force clear service workers to fix white screen issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      
      // If root is empty after 10 seconds, show fallback
      setTimeout(() => {
        const root = document.getElementById('root');
        if (root && root.innerHTML === '') {
          document.getElementById('fallback-ui').style.display = 'flex';
        }
      }, 10000);
    </script>
  </body>
</html>
